services:
  - type: web
    name: duplicate-checker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py serve
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        sync: false
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_EMBED_MODEL
        value: text-embedding-3-small
